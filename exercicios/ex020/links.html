<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*  SELETORES PERSONALIZADOS
            #  = id
            .  = class
            :  = pseudo-class
            :: = pseudo-element
            >  = children(filhos)
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        
        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited { /* depois de clicar */
            color: darkred;
        }

        a:hover { /* passando o mouse por cima */
            color: black;
            text-decoration: underline;
        }

        a:active { /* enquanto estiver clicando */
            color: yellow;
        }
        a::before{ /* adiciona textos e símbolos antes das âncoras*/
            content: '✯';
        }

        a::after { /* adiciona textos e símbolos depois das âncoras. */
            content: '[link]';
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }

        .especial {
            background-color: rgb(252, 124, 124);
            width: 260px;
        }

        .especial::before{
            content: '✴';
        }

        .especial::after {
            content: '✴';
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://www.youtube.com/cursoemvideo">Canal do YouTube</a></li>
        <li class="especial"><a href="www.cursoemvideo.com">Site do Curso em vídeo</a></li>
    </ul>
</body>
</html>
