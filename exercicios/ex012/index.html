<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos em HTML</title>
</head>
<body>
    <h1>Inserindo vódeos hospedados localmente</h1>
    <video width="400" poster="imagens/thumb.jpg" controls>
        <source src="midia/Meu-Video-mkv.mkv" type="video/mkv">
        <source src="midia/Meu-Video-editado.mp4" type="video/mp4">
        <source src="midia/Meu-Video-web.webm" type="video/webm">
        <source src="midia/Meu-Video-ogv.ogv" type="video/ogv">
        <p>Seu navegador não tem compatibilidade com reprodução de vídeos.</p>
    </video>

    <h1>Inserindo vídeos externos</h1>
    <h2>Vídeo do YouTube</h2>
    <iframe width="400" height="300" src="https://www.youtube.com/embed/d95PPykB2vE?si=v9a4Oxw4-GD1kRQw" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h2>Vídeo do Vimeo</h2>

</body>
</html>
