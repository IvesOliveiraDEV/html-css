<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradientes</title>
    <style>
        * { /* configurações globais das CSS */
            height: 100%;
        }
        body {
            background-image: -moz-linear-gradient(to top, #0DBD3F, #2A683B, #233D2A);
            background-attachment: fixed;
        }
    </style>
    <!-- podendo ser to right, to left,to top, to bottom-->
</head>
<body>
    <h1>Como fazer degradê com CSS</h1>
    <p>testando</p>
</body>
</html>
