<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>

    <h1>Reproduzindo áudios</h1>
    <p>
        Vamos aprender a reproduzir áudios em HTML5.
    </p>
    <p>
        Uma das formas de tocar áudios é:</p>
    <audio src="midias/road-magic.mp3" controls autoplay></audio>
    <p>
        Outra forma de tocar áudios é:
    </p>
    <audio preload="metadata" autoplay controls loop>
        <source src="midias/end-valor.mp3" type="audio/mpeg">
        <source src="midias/end-valor.ogg" type="audio/ogg">
        <source src="midias/end-valor.wav" type="audio/wav">
        <p>
            Infelizmente seu navegador não consegue reproduzir áudio. <a href="midias/end-valor.mp3" download="end-valor.mp3" type="audio/mpeg">CLIQUE AQUI</a> para baixar o áudio em MP3.
        </p>
    </audio>
</body>
</html>
