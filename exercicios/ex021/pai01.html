<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <title>Modelo de caixas</title>
    <style>
        h1 { /* BOX-LEVEL*/
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-width: 18px;
            border-style: solid;
            border-color: darkslategray;

            /*
            border: 18px solid darkslategray;
            */

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            /*
            padding: 10px (se todas forem iguais que é esse o caso)
            */

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            margin-left: 10px;

            /*
            margin: 10px 20px 40px 20px;

            para deixar a caixa sempre no meio usa-se margin:auto;
            */

            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;
        }

        a{ /* INLINE-LEVEL */
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. vamos ver como tudo isso funciona.</p>
</body>
</html>
